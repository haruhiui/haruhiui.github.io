name: Check Upstream Updates

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch upstream main
        run: |
          git remote add upstream https://github.com/theme-shoka-x/astro-blog-shokax.git
          git fetch upstream main

      - name: Diff main vs upstream
        id: diff
        run: |
          DIFF=$(git diff --stat main upstream/main -- . ':!.github' ':!src/posts' ':!src/content' ':!src/assets' ':!src/theme.config.ts' ':!astro.config.mjs' || true)
          if [ -z "$DIFF" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "diff<<EOF" >> $GITHUB_OUTPUT
            echo "$DIFF" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if upstream changed
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff }}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔔 官方主题有更新',
              body: `上游 [theme-shoka-x/astro-blog-shokax](https://github.com/theme-shoka-x/astro-blog-shokax) 有文件变动。\n\n受影响文件：\n\`\`\`\n${diff}\n\`\`\`\n\n同步方法：\n\`\`\`bash\ngit fetch shokax main\ngit diff main FETCH_HEAD  # 查看差异\ngit merge FETCH_HEAD       # 合并更新\n\`\`\``
            })
